<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV — Micah Eckert</title>
  <meta name="description" content="Curriculum Vitae — Micah Eckert. MSc candidate in Arctic ecohydrology at UBC.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%232563eb'/><text x='50' y='72' font-size='60' font-family='Georgia,serif' fill='%23fff' text-anchor='middle'>M</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── CV page layout ── */
    .cv-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-alt);
    }

    /* Top bar */
    .cv-topbar {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 58px;
      gap: 1rem;
    }
    .cv-topbar-left {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .cv-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color var(--transition);
    }
    .cv-back:hover { color: var(--blue); }
    .cv-title {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--text-faint);
      letter-spacing: 0.05em;
    }
    .cv-topbar-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .cv-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.03em;
      padding: 0.4rem 0.85rem;
      border-radius: var(--radius-sm);
      text-decoration: none;
      transition: background var(--transition), color var(--transition);
      cursor: pointer;
    }
    .cv-btn-primary {
      background: var(--blue);
      color: #fff;
      border: none;
    }
    .cv-btn-primary:hover { background: var(--blue-lt); }
    .cv-btn-ghost {
      background: none;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .cv-btn-ghost:hover { border-color: var(--blue); color: var(--blue); }

    /* PDF embed area */
    .cv-embed-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 2rem;
      gap: 0;
    }
    .cv-embed-frame {
      flex: 1;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg);
      box-shadow: var(--shadow-lg);
      min-height: 0;
    }
    .cv-embed-frame iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 58px - 4rem);
      border: none;
      min-height: 600px;
    }

    /* Fallback if PDF not present */
    .cv-fallback {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      height: 100%;
      min-height: 400px;
      text-align: center;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }

    @media (max-width: 600px) {
      .cv-topbar { padding: 0 1rem; }
      .cv-embed-area { padding: 1rem; }
      .cv-embed-frame iframe { height: calc(100vh - 58px - 2rem); }
      .cv-title { display: none; }
    }
  </style>
</head>
<body class="cv-page">

  <!-- ===== TOP BAR ===== -->
  <header class="cv-topbar">
    <div class="cv-topbar-left">
      <a href="index.html" class="cv-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back
      </a>
      <span class="cv-title">Micah Eckert — Curriculum Vitae</span>
    </div>
    <div class="cv-topbar-actions">
      <a href="Eckert_CV.pdf" target="_blank" rel="noopener" class="cv-btn cv-btn-ghost">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open in browser
      </a>
      <a href="Eckert_CV.pdf" download class="cv-btn cv-btn-primary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PDF
      </a>
    </div>
  </header>

  <!-- ===== PDF EMBED ===== -->
  <main class="cv-embed-area">
    <div class="cv-embed-frame">
      <iframe src="Eckert_CV.pdf#toolbar=0&view=FitH" title="Micah Eckert — Curriculum Vitae">
        <div class="cv-fallback">
          <p>// PDF preview unavailable in this browser</p>
          <a href="Eckert_CV.pdf" download class="cv-btn cv-btn-primary">Download CV</a>
        </div>
      </iframe>
    </div>
  </main>

</body>
</html>
